# Production nginx — SSL certs in docker/nginx/ssl/
# Domains: maskara.bd, www, app, api

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 20M;

  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

  upstream frontend {
    server frontend:3000;
  }

  upstream backend {
    server backend:4000;
  }

  # HTTP → HTTPS
  server {
    listen 80;
    server_name maskara.bd www.maskara.bd app.maskara.bd api.maskara.bd;
    return 301 https://$host$request_uri;
  }

  # Apex + www → app
  server {
    listen 443 ssl http2;
    server_name maskara.bd www.maskara.bd;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 301 https://app.maskara.bd$request_uri;
  }

  # Frontend — app.maskara.bd
  server {
    listen 443 ssl http2;
    server_name app.maskara.bd;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
      proxy_pass http://frontend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  # API + webhooks — api.maskara.bd
  server {
    listen 443 ssl http2;
    server_name api.maskara.bd;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
      limit_req zone=api burst=50 nodelay;
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
