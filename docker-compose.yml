services:
  postgres:
    image: postgres:16-alpine
    container_name: maskara-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-maskara}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-maskara_secret}
      POSTGRES_DB: ${POSTGRES_DB:-maskara}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U maskara']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: maskara-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: maskara-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-maskara}:${POSTGRES_PASSWORD:-maskara_secret}@postgres:5432/${POSTGRES_DB:-maskara}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-before-production-abc123xyz}
      JWT_EXPIRES_IN: 7d
      VOICE_PROVIDER: ${VOICE_PROVIDER:-auto}
      EPBX_API_URL: ${EPBX_API_URL:-https://epbx.bd/api/v1}
      EPBX_API_KEY: ${EPBX_API_KEY}
      EPBX_CUSTOMER_ID: ${EPBX_CUSTOMER_ID}
      EPBX_IVR_ID: ${EPBX_IVR_ID}
      IPPBX_API_URL: ${IPPBX_API_URL}
      IPPBX_API_KEY: ${IPPBX_API_KEY}
      IPPBX_API_SECRET: ${IPPBX_API_SECRET}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-ap-southeast-1}
      APP_URL: ${APP_URL:-http://localhost:3000}
      API_URL: ${API_URL:-http://localhost:4000}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - '4000:4000'
    healthcheck:
      test: ['CMD-SHELL', 'node -e "require(\"http\").get(\"http://127.0.0.1:4000/health\",r=>process.exit(r.statusCode===200?0:1)).on(\"error\",()=>process.exit(1))"']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:4000}
        NEXT_PUBLIC_APP_URL: ${APP_URL:-http://localhost:3000}
    container_name: maskara-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:4000}
      NEXT_PUBLIC_APP_URL: ${APP_URL:-http://localhost:3000}
    ports:
      - '3000:3000'

  nginx:
    image: nginx:alpine
    container_name: maskara-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: maskara-worker
    restart: unless-stopped
    command: npm run worker:prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-maskara}:${POSTGRES_PASSWORD:-maskara_secret}@postgres:5432/${POSTGRES_DB:-maskara}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-before-production-abc123xyz}
      VOICE_PROVIDER: ${VOICE_PROVIDER:-auto}
      EPBX_API_URL: ${EPBX_API_URL:-https://epbx.bd/api/v1}
      EPBX_API_KEY: ${EPBX_API_KEY}
      EPBX_CUSTOMER_ID: ${EPBX_CUSTOMER_ID}
      EPBX_IVR_ID: ${EPBX_IVR_ID}
      IPPBX_API_URL: ${IPPBX_API_URL}
      IPPBX_API_KEY: ${IPPBX_API_KEY}
      IPPBX_API_SECRET: ${IPPBX_API_SECRET}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      API_URL: ${API_URL:-http://localhost:4000}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}

volumes:
  postgres_data:
  redis_data:
