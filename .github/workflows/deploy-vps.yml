name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_SSH_PASSWORD }}
          command_timeout: 50m
          script: |
            set -e
            REPO="https://github.com/octalagency/maskara.git"
            DIR="/opt/maskara"
            if [ ! -d "$DIR/.git" ]; then
              git clone "$REPO" "$DIR"
            fi
            cd "$DIR"
            git fetch origin main
            git checkout main
            git pull origin main
            chmod +x scripts/vps-redeploy.sh scripts/vps-git-deploy.sh 2>/dev/null || true
            bash scripts/vps-redeploy.sh
            echo "Deploy finished: https://app.maskara.bd/admin"
