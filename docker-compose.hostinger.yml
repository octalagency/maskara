# Hostinger one-shot — builds on VPS (no Docker Hub needed)
# Usage: docker compose -f docker-compose.hostinger.yml up -d --build

services:
  postgres:
    image: postgres:16-alpine
    container_name: maskara-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-maskara}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-maskara}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U maskara']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: maskara-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: maskara-backend:local
    pull_policy: never
    container_name: maskara-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      RUN_SEED: ${RUN_SEED:-false}
      DATABASE_URL: postgresql://${POSTGRES_USER:-maskara}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-maskara}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      VOICE_PROVIDER: ${VOICE_PROVIDER:-epbx}
      EPBX_API_URL: ${EPBX_API_URL:-https://maskara.epbx.bd/api/v1}
      EPBX_API_KEY: ${EPBX_API_KEY}
      EPBX_CUSTOMER_ID: ${EPBX_CUSTOMER_ID:-}
      EPBX_IVR_ID: ${EPBX_IVR_ID:-}
      APP_URL: ${APP_URL:-https://app.maskara.bd}
      API_URL: ${API_URL:-https://api.maskara.bd}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-https://api.maskara.bd}
      FRONTEND_URL: ${FRONTEND_URL:-https://app.maskara.bd}
      VOICE_WEBHOOK_SECRET: ${VOICE_WEBHOOK_SECRET}
      WOOCOMMERCE_WEBHOOK_SECRET: ${WOOCOMMERCE_WEBHOOK_SECRET}
    healthcheck:
      test: ['CMD-SHELL', 'node -e "require(\"http\").get(\"http://127.0.0.1:4000/health\",r=>process.exit(r.statusCode===200?0:1)).on(\"error\",()=>process.exit(1))"']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${API_URL:-https://api.maskara.bd}
        NEXT_PUBLIC_APP_URL: ${APP_URL:-https://app.maskara.bd}
        NEXT_PUBLIC_PRODUCTION: 'true'
    image: maskara-frontend:local
    pull_policy: never
    container_name: maskara-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    expose:
      - '3000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/ || exit 1']
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s

  worker:
    image: maskara-backend:local
    pull_policy: never
    container_name: maskara-worker
    restart: unless-stopped
    command: npm run worker:prod
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-maskara}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-maskara}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      VOICE_PROVIDER: ${VOICE_PROVIDER:-epbx}
      EPBX_API_URL: ${EPBX_API_URL:-https://maskara.epbx.bd/api/v1}
      EPBX_API_KEY: ${EPBX_API_KEY}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-https://api.maskara.bd}
      FRONTEND_URL: ${FRONTEND_URL:-https://app.maskara.bd}
      VOICE_WEBHOOK_SECRET: ${VOICE_WEBHOOK_SECRET}
      WOOCOMMERCE_WEBHOOK_SECRET: ${WOOCOMMERCE_WEBHOOK_SECRET}

  nginx:
    image: nginx:alpine
    container_name: maskara-nginx
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./docker/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro

volumes:
  postgres_data:
  redis_data:
